# Nginx configuration for Panel Event
# Location: /etc/nginx/sites-available/panel-evento
# This configuration serves all panel pages under /panel/ path
# 
# To install:
# 1. sudo cp nginx-panel.conf /etc/nginx/sites-available/panel-evento
# 2. sudo ln -sf /etc/nginx/sites-available/panel-evento /etc/nginx/sites-enabled/
# 3. sudo nginx -t
# 4. sudo systemctl reload nginx

# Panel location block - add this to your main server block for evento.encuentra-facil.com
# This should be added INSIDE the existing server {} block

# ===========================================
# Add this location block to your server config:
# ===========================================

location /panel/ {
    alias /var/www/panel/;
    index index.html;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # Handle HTML files explicitly
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    
    # Try files, fallback to index.html for SPA-like behavior
    try_files $uri $uri/ /panel/index.html;
}

